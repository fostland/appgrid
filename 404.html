<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 — Страница не найдена | AppGrid</title>
<meta name="robots" content="noindex">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232563eb'/%3E%3Ctext x='50' y='72' font-size='54' text-anchor='middle' fill='white' font-family='Arial'%3E📱%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc;
    --border: rgba(0, 0, 0, 0.06);
    --accent: #2563eb;
    --text: #0f172a;
    --muted: #64748b;
    --card-bg: #ffffff;
    --grad-primary: linear-gradient(135deg, #2563eb, #3b82f6);
    --grad-accent: linear-gradient(135deg, #2563eb, #059669);
    --blob-opacity: 0.18;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0f;
      --border: rgba(255, 255, 255, 0.06);
      --text: #f0f0f8;
      --muted: #6b6b88;
      --card-bg: #15151c;
      --blob-opacity: 0.12;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Golos Text", "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(110px);
    opacity: var(--blob-opacity);
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: #2563eb; top: -150px; left: -150px; }
  .blob-2 { width: 400px; height: 400px; background: #10b981; bottom: -80px; right: -100px; }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5%;
    height: 68px;
    background: rgba(248, 250, 252, 0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  @media (prefers-color-scheme: dark) {
    nav { background: rgba(10, 10, 15, 0.92); }
  }
  .nav-logo {
    font-family: "Unbounded", sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -1px;
    background: var(--grad-accent);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-back {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--accent); }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 5% 80px;
  }
  .error-code {
    font-family: "Unbounded", sans-serif;
    font-size: clamp(80px, 20vw, 160px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -4px;
    background: var(--grad-accent);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 24px;
  }
  .error-title {
    font-family: "Unbounded", sans-serif;
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 16px;
  }
  .error-desc {
    font-size: 16px;
    color: var(--muted);
    max-width: 400px;
    margin-bottom: 40px;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--grad-primary);
    color: #fff;
    font-weight: 600;
    padding: 13px 32px;
    border-radius: 100px;
    text-decoration: none;
    box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
    font-size: 15px;
    font-family: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(37, 99, 235, 0.35); }

  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 24px 5%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--card-bg);
  }
  .footer-copy { font-size: 12px; color: var(--muted); }

  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
  @media (max-width: 480px) {
    .nav-logo { font-size: 18px; }
    .nav-back { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<nav aria-label="Основная навигация">
  <a href="./" class="nav-logo">AppGrid</a>
  <a href="./" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    На главную
  </a>
</nav>

<main>
  <div class="error-code" aria-hidden="true">404</div>
  <h1 class="error-title">Страница не найдена</h1>
  <p class="error-desc">Возможно, ссылка устарела или страница была перемещена.</p>
  <a href="./" class="btn-primary">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Вернуться на главную
  </a>
</main>

<footer>
  <p class="footer-copy">© 2026 AppGrid · appgrid.ru</p>
</footer>
</body>
</html>
